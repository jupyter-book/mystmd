name: CI

on:
  push:
    branches: [main, ci-*]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: recursive
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Check formatting (style rules etc)
        run: bun run lint:format
      - name: Run linter (code correctness etc)
        run: bun run lint
      - name: Check for circular dependencies
        run: bun run lint:circular
      - name: Ensure changeset has the right structure and doesn't contain ignored packages
        run: bun run version
      - name: Ensure release PR consumes a myst-cli changeset
        if: github.event_name == 'pull_request' && github.head_ref == 'changeset-release/main'
        run: |
          if ! git diff HEAD^1 -- .changeset | grep -q myst-cli; then
            echo "::error::No consumed changeset bumps 'myst-cli'. See https://mystmd.org/guide/developer#changesets-myst-cli"
            exit 1
          fi
  test:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["20", "22", "24"]
    name: Testing with bun and node ${{ matrix.node }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: recursive
      - uses: ./.github/actions/install
        with:
          node: ${{ matrix.node }}
      - name: Run tests
        run: bun run test
  # This is just an additional check to make sure the build passes with our docs
  docs:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    name: Running test docs build
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install myst
        uses: ./.github/actions/install
      - name: Install docs dependencies
        run: |
          pip install -r docs/requirements.txt
      - name: Build docs
        run: |
          cd docs
          myst build --html --execute
